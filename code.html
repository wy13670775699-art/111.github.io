<body class="text-on-surface overflow-x-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-20 bg-[#f7f6f2] dark:bg-slate-900 shadow-[0_4px_0_0_rgba(0,0,0,0.05)]">
<div class="flex items-center gap-4">
<span class="text-2xl font-black text-[#433700] dark:text-[#fdd400] tracking-tight font-['Plus_Jakarta_Sans']">ArtPlay</span>
<div class="h-8 w-[2px] bg-[#e5e4df] mx-2"></div>
<nav class="hidden md:flex gap-6">
</nav>
</div>
<div class="flex items-center gap-4">
<div class="flex items-center gap-1 px-3 py-1 bg-green-100 text-green-700 rounded-full border-2 border-green-500 font-bold text-xs">

<span>已连接</span>
</div>
<button class="p-2 rounded-full hover:bg-[#fdd400]/10 active:translate-y-1 transition-all">
<span class="material-symbols-outlined text-2xl text-[#2e2f2d]">notifications</span>
</button>
<div class="flex items-center gap-3 bg-surface-container-lowest comic-border py-1 px-3 rounded-full pop-shadow-sm">
<div class="text-right">
<p class="text-xs font-bold text-on-surface-variant leading-none">Grade 2 Artist</p>
<p class="font-headline font-extrabold text-sm text-[#433700]">陈小明</p>
</div>

</div>

<main class="pt-24 pb-12 px-6 max-w-[1280px] mx-auto min-h-screen">

<section class="relative mb-12 group">
<div class="bg-primary-container comic-border rounded-lg p-8 pop-shadow overflow-hidden relative min-h-[160px] flex flex-col justify-center">

<div class="absolute top-0 right-0 w-64 h-full opacity-10 pointer-events-none">
<div class="grid grid-cols-4 gap-2 p-4">
<div class="w-8 h-8 rounded-full bg-on-primary-container"></div>
<div class="w-8 h-8 rotate-45 bg-on-primary-container"></div>
<div class="w-8 h-8 rounded-full bg-on-primary-container"></div>
<div class="w-8 h-8 rotate-12 bg-on-primary-container"></div>
</div>
</div>
<div class="relative z-10 flex flex-col md:flex-row md:items-center justify-between gap-8">
<div class="flex-1">
<div class="inline-flex items-center gap-2 bg-on-primary-container text-primary-container px-3 py-1 rounded-full mb-4">
<span class="material-symbols-outlined text-sm" style='font-variation-settings: "FILL" 1;'>bolt</span>
<span class="font-headline font-bold text-sm tracking-tight">课程挑战</span>
</div>
<h1 class="font-headline font-black text-4xl text-on-primary-fixed leading-tight">

                        </p>
</div>

<div class="flex flex-col gap-6 min-w-[360px] pt-4">
<div class="flex justify-between items-end px-1">
<span class="text-on-primary-fixed font-black text-sm">当前进度: 表达</span>
<span class="text-on-primary-fixed-variant font-bold text-xs italic">2/5 Steps</span>
</div>
<div class="relative flex items-center justify-between px-4">

<div class="absolute left-8 right-8 h-[3px] border-t-4 border-dashed border-on-primary-container/30 top-1/2 -translate-y-1/2 z-0"></div>
<div class="absolute left-8 w-[25%] h-[3px] border-t-4 border-dashed border-on-primary-container top-1/2 -translate-y-1/2 z-0"></div>
<!-- Step 1: 观察 -->
<div class="relative z-10 flex flex-col items-center gap-2">
<span class="text-[10px] font-black uppercase text-on-primary-fixed">观察</span>
<div class="w-6 h-6 rounded-full bg-on-primary-container comic-border flex items-center justify-center text-primary-container">
<span class="material-symbols-outlined text-[14px] font-black">check</span>
</div>
</div>
<!-- Step 2: 表达 -->
<div class="relative z-10 flex flex-col items-center gap-2">
<span class="text-[10px] font-black uppercase text-on-primary-fixed">表达</span>
<div class="w-8 h-8 rounded-full bg-white comic-border flex items-center justify-center pop-shadow-sm scale-110">
<div class="w-2.5 h-2.5 rounded-full bg-primary animate-pulse"></div>
</div>
</div>
<!-- Step 3: 选择 -->
<div class="relative z-10 flex flex-col items-center gap-2">
<span class="text-[10px] font-black uppercase text-on-primary-fixed opacity-60">选择</span>
<div class="w-6 h-6 rounded-full bg-white/50 comic-border"></div>
</div>

<div class="relative z-10 flex flex-col items-center gap-2">
<span class="text-[10px] font-black uppercase text-on-primary-fixed opacity-60">关系</span>
<div class="w-6 h-6 rounded-full bg-white/50 comic-border"></div>
</div>

<span class="text-[10px] font-black uppercase text-on-primary-fixed opacity-60">创作</span>
<div class="w-6 h-6 rounded-full bg-white/50 comic-border"></div>
</div>
</div>
</div>
</div>
</div>
</section>
<div class="grid grid-cols-1 lg:grid-cols-12 gap-10 items-start">

<span class="material-symbols-outlined text-4xl">explore</span>
</div>
<span class="mt-4 font-black text-sm bg-on-primary-container text-primary-container px-3 py-1 rounded-full comic-border whitespace-nowrap">当前：不迷路的新手</span>

<div class="absolute left-[45%] top-[35%] flex flex-col items-center opacity-40">

<span class="material-symbols-outlined">lock</span>
</div>
<span class="mt-2 font-bold text-xs bg-white px-2 rounded-full comic-border">触摸博物馆</span>
</div>

<span class="material-symbols-outlined">lock</span>
</div>
<span class="mt-2 font-bold text-xs">隐形的安全卫士</span>
</div>
<div class="absolute right-[8%] top-[45%] flex flex-col items-center opacity-40">
<div class="w-16 h-16 bg-surface-container-highest rounded-full comic-border flex items-center justify-center text-on-surface-variant z-10">
<span class="material-symbols-outlined">lock</span>
</div>

</div>
</div>
</div>

<!-- Block 1: Enter Canvas -->
<button class="w-full group text-left overflow-hidden bg-secondary-container comic-border rounded-lg pop-shadow hover:-translate-y-1 active:translate-y-1 transition-all">

</div>
<div>
<h3 class="font-headline font-black text-2xl text-on-secondary-container">进入画布</h3>
<p class="text-on-secondary-fixed-variant font-medium">自由创作你的艺术作品</p>
</div>
<span class="material-symbols-outlined ml-auto text-on-secondary-container group-hover:translate-x-1 transition-transform">arrow_forward_ios</span>

<div>

</div>
<span class="material-symbols-outlined ml-auto text-on-tertiary-container group-hover:translate-x-1 transition-transform">arrow_forward_ios</span>

</button>

<span class="material-symbols-outlined text-4xl" style='font-variation-settings: "FILL" 1;'>folder_special</span>
</div>
<div>
<h3 class="font-headline font-black text-2xl text-on-surface">我的作品</h3>

</div>

<span class="material-symbols-outlined text-4xl" style='font-variation-settings: "FILL" 1;'>forum</span>
</div>
<div>
<h3 class="font-headline font-black text-2xl text-on-primary-container">班级互评墙</h3>

</div>
<span class="material-symbols-outlined ml-auto text-on-primary-container group-hover:translate-x-1 transition-transform">arrow_forward_ios</span>

</div>
</div>

<button class="flex flex-col items-center gap-1 text-[#2e2f2d]/60">

</button>
<button class="flex flex-col items-center gap-1 text-[#2e2f2d]/60">
<span class="material-symbols-outlined" style="">person</span>
<span class="text-[10px] font-bold">我的</span>
</button>
